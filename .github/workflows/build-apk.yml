name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Find Android project folder
        shell: bash
        run: |
          echo "Searching for settings.gradle.kts..."
          PROJECT_DIR=$(find . -name "settings.gradle.kts" -not -path "*/.gradle/*" -print | while read f; do
            if grep -q 'include(":app")' "$f"; then
              dirname "$f"
              break
            fi
          done)

          if [ -z "$PROJECT_DIR" ]; then
            echo "Could not find Android project root."
            echo "Files found:"
            find . -maxdepth 5 -type f | sort
            exit 1
          fi

          echo "Android project root: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Show detected project files
        shell: bash
        run: |
          echo "Using project dir: $PROJECT_DIR"
          ls -la "$PROJECT_DIR"
          echo "--- app folder ---"
          ls -la "$PROJECT_DIR/app"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        shell: bash
        run: |
          gradle -p "$PROJECT_DIR" assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StackerAssist-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
